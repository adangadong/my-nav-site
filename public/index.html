<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的极简导航</title>
    <!-- 引入 Tailwind CSS，让界面直接拥有高级感 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        // 护眼模式切换逻辑
        function toggleDarkMode() {
            document.documentElement.classList.toggle('dark');
        }
    </script>
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 transition-colors duration-300">

    <div class="max-w-5xl mx-auto p-6">
        <!-- 头部：标题与护眼模式按钮 -->
        <header class="flex justify-between items-center mb-10">
            <h1 class="text-2xl font-bold">我的常用网站</h1>
            <button onclick="toggleDarkMode()" class="px-4 py-2 bg-gray-200 dark:bg-gray-700 rounded-full">
                切换模式
            </button>
        </header>

        <!-- 导航区：这里放你的网站卡片 -->
        <main class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <!-- 示例卡片：未来我们会用代码动态生成 -->
            <div class="p-6 bg-white dark:bg-gray-800 rounded-xl shadow-sm border border-gray-100 dark:border-gray-700">
                <h2 class="font-bold mb-4 text-lg">工作常用</h2>
                <ul class="space-y-2">
                    <li><a href="https://github.com" class="text-blue-500 hover:underline">GitHub</a></li>
                    <li><a href="https://cloudflare.com" class="text-blue-500 hover:underline">Cloudflare</a></li>
                </ul>
            </div>
        </main>
    </div>

</body>
</html>
