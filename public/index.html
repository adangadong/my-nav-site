<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vincent的极简导航</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/style.css">
    <script>
        // 配置 Tailwind 支持暗黑模式暗号
        tailwind.config = { darkMode: 'class' }
        function toggleDarkMode() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.theme = isDark ? 'dark' : 'light';
        }
    </script>
</head>
<body class="bg-gray-50 dark:bg-[#0B0F19] text-gray-800 dark:text-gray-200 min-h-screen transition-colors duration-300">

    <div class="max-w-6xl mx-auto px-4 py-12">
        <!-- 头部导航栏 -->
        <header class="flex justify-between items-center mb-12 border-b border-gray-200/50 dark:border-gray-800/50 pb-6">
            <div>
                <h1 class="text-3xl font-bold tracking-tight bg-gradient-to-r from-gray-900 to-gray-600 dark:from-white dark:to-gray-400 bg-clip-text text-transparent">
                    Dashboard
                </h1>
                <p class="text-xs text-gray-400 mt-1">极简 & 生产力工具箱</p>
            </div>
            
            <div class="flex items-center space-x-3">
                <!-- 隐藏的添加分组按钮，只有登录后显示 -->
                <button id="add-group-btn" onclick="addGroup()" class="hidden px-3 py-1.5 text-xs bg-blue-500 text-white rounded-lg hover:bg-blue-600 transition-colors">
                    + 新建分组
                </button>
                
                <!-- 【新增】查看私密/锁住私密 按钮 -->
                <button id="private-btn" onclick="verifyPrivate()" class="px-3 py-1.5 text-xs border border-gray-300 dark:border-gray-700 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors">
                    查看私密
                </button>
                
                <button id="admin-btn" onclick="verifyAdmin()" class="px-3 py-1.5 text-xs border border-gray-300 dark:border-gray-700 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors">
                    管理后台
                </button>
                <button onclick="toggleDarkMode()" class="p-2 bg-gray-200 dark:bg-gray-800 rounded-lg text-sm">
                    🌓 护眼
                </button>
            </div>
        </header>

        <!-- 动态卡片容器（数据会注入到这里） -->
        <main id="nav-container" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
            <div class="text-center text-gray-400 col-span-full py-12">正在加载云端节点数据...</div>
        </main>
    </div>

    <!-- 载入前端核心控制逻辑 -->
    <script src="/app.js"></script>
</body>
</html>
